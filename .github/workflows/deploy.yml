name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend build ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/wellbeing-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/wellbeing-app
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend/wellbeing-app
        run: npm run build -- --configuration=production

      # ── Deploy frontend via rsync ──────────────────────────────────────────
      - name: Deploy frontend to server
        uses: burntsushi/rsync-deployments@v1.4.0
        with:
          switches: -avzr --delete
          path: frontend/wellbeing-app/dist/wellbeing-app/
          remote_path: /var/www/wellbeing/frontend/
          remote_host: ${{ secrets.REMOTE_HOST }}
          remote_user: ${{ secrets.REMOTE_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ── Deploy backend + run migrations via SSH ────────────────────────────
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend and run migrations
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'ENDSSH'
            set -e

            cd /var/www/wellbeing

            # Pull latest code
            git pull origin main

            # Install PHP dependencies (no dev, optimised autoloader)
            cd backend/wellbeing-api
            composer install --no-dev --optimize-autoloader --no-interaction

            # Run pending migrations
            php yii migrate --interactive=0

            # Flush Yii cache so AppSettings picks up any new defaults
            php yii cache/flush-all --interactive=0

            # Fix permissions
            chown -R www-data:www-data /var/www/wellbeing/backend/wellbeing-api/api/runtime
            chown -R www-data:www-data /var/www/wellbeing/backend/wellbeing-api/api/web/assets
            chmod -R 755 /var/www/wellbeing/backend/wellbeing-api/api/runtime
          ENDSSH
