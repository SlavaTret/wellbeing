name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Frontend build ─────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/wellbeing-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/wellbeing-app
        run: npm ci

      - name: Build Angular (production)
        working-directory: frontend/wellbeing-app
        run: npm run build -- --configuration=production

      # ── Deploy frontend via SSH-Deploy ─────────────────────────────────────
      - name: Deploy frontend to server
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /var/www/wellbeing/frontend/
          SOURCE: frontend/wellbeing-app/dist/wellbeing-app/
          ARGS: "-avzr --delete"

      # ── Deploy backend + run migrations via SSH ────────────────────────────
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend and run migrations
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'ENDSSH'
            set -e
            cd /var/www/wellbeing
            
            # Оновлюємо код
            git pull origin main

            # Бекенд налаштування
            cd backend/wellbeing-api
            composer install --no-dev --optimize-autoloader --no-interaction

            # Міграції в нову базу PostgreSQL
            php yii migrate --interactive=0
            php yii cache/flush-all --interactive=0

            # Права доступу
            chown -R www-data:www-data /var/www/wellbeing/backend/wellbeing-api/api/runtime
            chmod -R 775 /var/www/wellbeing/backend/wellbeing-api/api/runtime
          ENDSSH