name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Збірка Frontend (Angular) ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/wellbeing-app/package-lock.json

      - name: Install & Build Angular
        working-directory: frontend/wellbeing-app
        run: |
          npm ci
          npm run build -- --configuration=production

      # ── 2. Деплой фронтенду на сервер ─────────────────────────────────────
      - name: Deploy frontend to server
        uses: easingthemes/ssh-deploy@v5.0.3
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          TARGET: /var/www/wellbeing/frontend/
          SOURCE: frontend/wellbeing-app/dist/wellbeing-app/
          ARGS: "-avzr --delete"

      # ── 3. Деплой бекенду та запуск міграцій ──────────────────────────────
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Remote Server Commands
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} << 'ENDSSH'
            export COMPOSER_ALLOW_SUPERUSER=1
            set -e
            
            # Насильно оновлюємо код
            cd /var/www/wellbeing
            git config --global --add safe.directory /var/www/wellbeing
            git fetch origin main
            git reset --hard origin/main

            # Заходимо в бекенд для роботи з Composer
            cd backend/wellbeing-api
            composer install --no-dev --optimize-autoloader --no-interaction
            
            # ЗАПУСК YII (використовуємо знайдений шлях)
            php vendor/bin/yii cache/flush-all --interactive=0
            php vendor/bin/yii migrate --interactive=0

            # Права доступу на runtime
            chown -R www-data:www-data api/runtime
            chmod -R 775 api/runtime
          ENDSSH