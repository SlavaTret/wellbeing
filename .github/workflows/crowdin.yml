name: Crowdin i18n sync

on:
  push:
    branches: [main]
    paths:
      - 'frontend/wellbeing-app/src/assets/i18n/uk.json'
  workflow_dispatch:

jobs:
  # ── Push source strings to Crowdin ──────────────────────────
  upload-sources:
    name: Upload source (uk.json) to Crowdin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload sources
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          create_pull_request: false
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_API_TOKEN }}
          source: /frontend/wellbeing-app/src/assets/i18n/uk.json
          translation: /frontend/wellbeing-app/src/assets/i18n/%locale%.json

  # ── Pull finished translations from Crowdin ─────────────────
  download-translations:
    name: Download translations from Crowdin
    runs-on: ubuntu-latest
    needs: upload-sources
    steps:
      - uses: actions/checkout@v4

      - name: Download translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          create_pull_request: true
          pull_request_title: "i18n: update translations from Crowdin"
          pull_request_body: "Auto-generated PR with latest translations from Crowdin."
          pull_request_base_branch_name: main
          project_id: ${{ secrets.CROWDIN_PROJECT_ID }}
          token: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          source: /frontend/wellbeing-app/src/assets/i18n/uk.json
          translation: /frontend/wellbeing-app/src/assets/i18n/%locale%.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
