<router-outlet *ngIf="isAuthPage"></router-outlet>

<ng-container *ngIf="!isAuthPage">
  <!-- Mobile Header -->
  <header class="mobile-header">
    <button class="icon-button" (click)="openSidebar()" aria-label="Меню">
      <app-icon name="menu" [size]="22" [strokeWidth]="2"></app-icon>
    </button>

    <div class="mobile-logo">
      <div class="logo-mark"><app-icon name="heart" [size]="14" stroke="#fff" fill="#fff" [strokeWidth]="0"></app-icon></div>
      <div class="logo-text">well<strong>being</strong></div>
    </div>

    <button class="icon-button bell-btn" (click)="navigate('notifications')" aria-label="Сповіщення">
      <app-icon name="bell" [size]="22"></app-icon>
      <span *ngIf="notificationsCount > 0" class="badge-dot">{{ notificationsCount }}</span>
    </button>
  </header>

  <!-- Drawer overlay (mobile only) -->
  <div class="drawer-overlay" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="desktop-sidebar" [class.open]="sidebarOpen">
    <div class="logo-section">
      <div class="logo-mark logo-mark-lg"><app-icon name="heart" [size]="18" stroke="#fff" fill="#fff" [strokeWidth]="0"></app-icon></div>
      <div>
        <div class="logo-text">well<strong>being</strong></div>
        <div class="logo-subtext">Портал підтримки</div>
      </div>
    </div>

    <div class="user-mini" (click)="navigate('profile')">
      <div class="avatar-mini">
        <img *ngIf="user?.avatar_url" [src]="user.avatar_url" [alt]="user?.first_name" />
        <span *ngIf="!user?.avatar_url">{{ (user?.first_name || 'U').charAt(0) }}</span>
      </div>
      <div class="user-info-mini">
        <div class="username-mini">{{ user?.first_name }} {{ user?.last_name }}</div>
        <div class="company-mini">{{ user?.company }}</div>
      </div>
    </div>

    <nav class="nav-menu">
      <button *ngFor="let item of navItems"
              (click)="navigate(item.id)"
              [class.active]="activeTab === item.id"
              class="nav-item">
        <app-icon [name]="item.icon" [size]="18"></app-icon>
        <span class="nav-label">{{ item.label }}</span>
        <span *ngIf="item.badge && item.badge > 0" class="nav-badge">{{ item.badge }}</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <button (click)="logout()" class="btn-logout">
        <app-icon name="logout" [size]="18"></app-icon>
        <span>Вийти</span>
      </button>
    </div>
  </aside>

  <main class="main-content">
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</ng-container>
