<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="assets/wellbeing-logo.png" alt="Wellbeing Company" class="auth-logo-img" />
    </div>

    <h1 class="auth-title">{{ 'auth.login.title' | translate }}</h1>
    <p class="auth-desc">{{ 'auth.login.desc' | translate }}</p>

    <div *ngIf="error" class="error-box">
      <app-icon name="info" [size]="16" stroke="#C62828"></app-icon>
      {{ error }}
    </div>

    <div class="form-field">
      <label>{{ 'auth.login.email' | translate }}</label>
      <div class="input-wrap">
        <app-icon name="mail" [size]="16" stroke="#6B8879" class="input-icon"></app-icon>
        <input type="email" [(ngModel)]="email" placeholder="you@company.com" [disabled]="loading" />
      </div>
    </div>

    <div class="form-field">
      <label>{{ 'auth.login.password' | translate }}</label>
      <div class="input-wrap">
        <app-icon name="shield" [size]="16" stroke="#6B8879" class="input-icon"></app-icon>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="••••••••"
          [disabled]="loading"
          (keyup.enter)="submit()" />
        <button type="button" class="icon-btn" (click)="showPassword = !showPassword">
          <app-icon [name]="showPassword ? 'eyeOff' : 'eye'" [size]="16" stroke="#6B8879"></app-icon>
        </button>
      </div>
    </div>

    <button class="btn-primary" (click)="submit()" [disabled]="loading">
      <span *ngIf="!loading">{{ 'auth.login.submit' | translate }}</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <p class="auth-link">
      {{ 'auth.login.no_account' | translate }} <a routerLink="/register">{{ 'auth.login.register_link' | translate }}</a>
    </p>
  </div>
</div>
