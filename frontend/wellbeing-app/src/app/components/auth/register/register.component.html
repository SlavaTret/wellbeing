<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-mark">
        <app-icon name="heart" [size]="16" stroke="#fff" fill="#fff" [strokeWidth]="0"></app-icon>
      </div>
      <div>
        <div class="logo-text">well<strong>being</strong></div>
        <div class="logo-sub">Портал підтримки</div>
      </div>
    </div>

    <h1 class="auth-title">Реєстрація</h1>
    <p class="auth-desc">Створіть новий акаунт</p>

    <div *ngIf="error" class="error-box">
      <app-icon name="info" [size]="16" stroke="#C62828"></app-icon>
      {{ error }}
    </div>

    <div class="form-row">
      <div class="form-field">
        <label>Ім'я</label>
        <input type="text" [(ngModel)]="firstName" placeholder="Олена" [disabled]="loading" />
      </div>
      <div class="form-field">
        <label>Прізвище</label>
        <input type="text" [(ngModel)]="lastName" placeholder="Бондар" [disabled]="loading" />
      </div>
    </div>

    <div class="form-field">
      <label>Email</label>
      <div class="input-wrap">
        <app-icon name="mail" [size]="16" stroke="#6B8879" class="input-icon"></app-icon>
        <input type="email" [(ngModel)]="email" placeholder="you@company.com" [disabled]="loading" />
      </div>
    </div>

    <div class="form-field">
      <label>Компанія</label>
      <div class="select-wrap">
        <app-icon name="building" [size]="16" stroke="#6B8879" class="input-icon"></app-icon>
        <select [(ngModel)]="companyId" [disabled]="loading || loadingCompanies">
          <option [ngValue]="null" disabled>
            {{ loadingCompanies ? 'Завантаження…' : 'Оберіть компанію' }}
          </option>
          <option *ngFor="let c of companies" [ngValue]="c.id">{{ c.name }}</option>
        </select>
        <span class="select-arrow">
          <app-icon name="chevronDown" [size]="14" stroke="#6B8879"></app-icon>
        </span>
      </div>
    </div>

    <div class="form-field">
      <label>Пароль</label>
      <div class="input-wrap">
        <app-icon name="shield" [size]="16" stroke="#6B8879" class="input-icon"></app-icon>
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder="Мінімум 8 символів"
          [disabled]="loading"
          (keyup.enter)="submit()" />
        <button type="button" class="icon-btn" (click)="togglePasswordVisibility()" title="Показати/Сховати">
          <app-icon [name]="showPassword ? 'eyeOff' : 'eye'" [size]="16" stroke="#6B8879"></app-icon>
        </button>
        <button type="button" class="icon-btn" (click)="generatePassword()" title="Згенерувати надійний пароль">
          <app-icon name="sparkles" [size]="16" stroke="#6B8879"></app-icon>
        </button>
      </div>
      <div class="password-hint">Натисніть ✦ щоб створити надійний пароль автоматично</div>
    </div>

    <div class="terms-row">
      <div class="checkbox-custom" [class.checked]="acceptedTerms" (click)="acceptedTerms = !acceptedTerms">
        <svg *ngIf="acceptedTerms" width="12" height="12" viewBox="0 0 24 24" fill="none"
          stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <span class="terms-text">
        Я погоджуюсь з <span class="link-green">умовами користування сервісом</span>
        та <span class="link-green">політикою конфіденційності</span>
      </span>
    </div>

    <button class="btn-primary" (click)="submit()" [disabled]="loading">
      <span *ngIf="!loading">Зареєструватися</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>

    <p class="auth-link">
      Вже є акаунт? <a routerLink="/login">Увійти</a>
    </p>
  </div>
</div>
