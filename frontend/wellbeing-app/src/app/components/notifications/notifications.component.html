<h2 class="section-title">Сповіщення</h2>

<div class="notif-layout">
  <!-- Notification list -->
  <div class="notif-list">
    <div *ngFor="let n of notifs" class="card notif-card" [class.unread]="!n.read">
      <div class="notif-inner">
        <div class="notif-icon-wrap" [class.icon-unread]="!n.read">
          <svg *ngIf="n.icon === 'bell'" width="16" height="16" viewBox="0 0 24 24" fill="none" [attr.stroke]="!n.read ? 'var(--green)' : 'var(--text-muted)'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <svg *ngIf="n.icon === 'check'" width="16" height="16" viewBox="0 0 24 24" fill="none" [attr.stroke]="!n.read ? 'var(--green)' : 'var(--text-muted)'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <svg *ngIf="n.icon === 'star'" width="16" height="16" viewBox="0 0 24 24" fill="none" [attr.stroke]="!n.read ? 'var(--green)' : 'var(--text-muted)'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <div class="notif-content">
          <div class="notif-title" [class.bold]="!n.read">{{ n.title }}</div>
          <div class="notif-body">{{ n.body }}</div>
          <div class="notif-time">{{ n.time }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="card settings-panel">
    <div class="settings-title">Налаштування</div>
    <div *ngFor="let s of settingsList" class="setting-row">
      <span class="setting-label">{{ s.label }}</span>
      <div class="toggle" [class.on]="getValue(s.key)" (click)="toggle(s.key)">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>
</div>
