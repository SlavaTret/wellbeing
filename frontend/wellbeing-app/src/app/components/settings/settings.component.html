<h2 class="section-title">Налаштування</h2>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn" [class.active]="activeTab === 'notifications'" (click)="setTab('notifications')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
    </svg>
    Сповіщення
  </button>
  <button class="tab-btn" [class.active]="activeTab === 'integrations'" (click)="setTab('integrations')">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
    </svg>
    Інтеграції
  </button>
</div>

<!-- ═══════════ TAB: NOTIFICATIONS ═══════════ -->
<div *ngIf="activeTab === 'notifications'" class="tab-content">
  <div class="card">
    <div class="card-head">
      <span class="card-title">Канали сповіщень</span>
      <span *ngIf="savingSettings" class="saving-label">Збереження...</span>
    </div>

    <div *ngFor="let s of settingsList" class="setting-row">
      <div class="setting-info">
        <span class="setting-label">{{ s.label }}</span>
        <span class="setting-desc">{{ s.desc }}</span>
      </div>
      <div class="toggle" [class.on]="settings[s.key]" (click)="toggleSetting(s.key)">
        <div class="toggle-knob"></div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ TAB: INTEGRATIONS ═══════════ -->
<div *ngIf="activeTab === 'integrations'" class="tab-content">

  <!-- Google Calendar -->
  <div class="card integration-card">
    <div class="integration-head">
      <div class="integration-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </div>
      <div class="integration-info">
        <div class="integration-name">Google Calendar</div>
        <div class="integration-desc">Автоматично додавати консультації в ваш календар і створювати Google Meet посилання</div>
      </div>
      <div class="integration-status" *ngIf="!googleLoading">
        <span class="status-badge status-badge--on"  *ngIf="googleConnected">Підключено</span>
        <span class="status-badge status-badge--off" *ngIf="!googleConnected">Не підключено</span>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div *ngIf="googleLoading" class="google-loading">
      <div class="spinner-sm"></div>
      <span>Завантаження...</span>
    </div>

    <!-- Status message -->
    <div *ngIf="!googleLoading && googleStatusMsg" class="google-msg"
         [class.google-msg--ok]="googleStatusOk"
         [class.google-msg--err]="!googleStatusOk">
      {{ googleStatusMsg }}
    </div>

    <!-- Connected state -->
    <div *ngIf="!googleLoading && googleConnected" class="google-connected-row">
      <div class="google-account">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <span>{{ googleEmail }}</span>
      </div>
      <button class="btn-disconnect" (click)="disconnectGoogle()" [disabled]="googleDisconnecting">
        <span *ngIf="googleDisconnecting" class="spinner-sm"></span>
        {{ googleDisconnecting ? 'Відключення...' : 'Відключити' }}
      </button>
    </div>

    <!-- Not connected state -->
    <div *ngIf="!googleLoading && !googleConnected" class="google-connect-row">
      <button class="btn-connect-google" (click)="connectGoogle()" [disabled]="googleConnecting">
        <span *ngIf="googleConnecting" class="spinner-sm spinner-sm--white"></span>
        <svg *ngIf="!googleConnecting" width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        {{ googleConnecting ? 'Перехід до Google...' : 'Підключити Google Calendar' }}
      </button>
    </div>
  </div>

</div>
