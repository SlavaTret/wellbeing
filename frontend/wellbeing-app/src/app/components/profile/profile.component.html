<h2 class="section-title">Мій профіль</h2>

<div class="profile-grid">
  <!-- Avatar card -->
  <div class="card avatar-card">
    <div class="avatar-img">О</div>
    <div class="avatar-name">Олена Бондар</div>
    <div class="avatar-company">EPAM Ukraine</div>
    <button class="btn-change-photo">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      Змінити фото
    </button>
    <div class="user-id">ID: WB-2024-00142</div>
  </div>

  <!-- Form card -->
  <div class="card">
    <div class="form-header">
      <span class="form-title">Особисті дані</span>
      <div *ngIf="!editing">
        <button class="btn-edit" (click)="startEdit()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          Редагувати
        </button>
      </div>
      <div *ngIf="editing" class="edit-btns">
        <button class="btn-cancel-edit" (click)="cancelEdit()">Скасувати</button>
        <button class="btn-save" (click)="save()">Зберегти</button>
      </div>
    </div>

    <div *ngIf="saved" class="save-notice">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
      Дані успішно збережено
    </div>

    <div class="form-grid">
      <div class="form-field">
        <label>ПРІЗВИЩЕ</label>
        <input type="text" [(ngModel)]="form.lastName" [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>ІМ'Я</label>
        <input type="text" [(ngModel)]="form.firstName" [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>ПО БАТЬКОВІ</label>
        <input type="text" [(ngModel)]="form.patronymic" [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>КОМПАНІЯ</label>
        <input type="text" [(ngModel)]="form.company" [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>ТЕЛЕФОН</label>
        <input type="tel" [(ngModel)]="form.phone" [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>EMAIL</label>
        <input type="email" [(ngModel)]="form.email" [disabled]="!editing" [class.active]="editing">
      </div>
    </div>

    <div class="terms-row">
      <div class="checkbox-custom" [class.checked]="form.acceptedTerms" (click)="form.acceptedTerms = !form.acceptedTerms">
        <svg *ngIf="form.acceptedTerms" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>
      <span class="terms-text">
        Я погоджуюсь з <span class="link-green">умовами користування сервісом</span> та <span class="link-green">політикою конфіденційності</span>
      </span>
    </div>
  </div>
</div>
