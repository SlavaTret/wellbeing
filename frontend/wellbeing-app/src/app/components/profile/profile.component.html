<h2 class="section-title">Мій профіль</h2>

<div *ngIf="loading" class="loading-wrap">
  <div class="spinner-lg"></div>
</div>

<div *ngIf="!loading" class="profile-grid">
  <!-- Avatar card -->
  <div class="card avatar-card">
    <div class="avatar-img" [class.avatar-uploading]="avatarUploading">
      <img *ngIf="userService.current?.avatar_url"
           [src]="userService.current.avatar_url"
           [alt]="form.firstName" />
      <span *ngIf="!userService.current?.avatar_url">{{ avatarLetter }}</span>
      <div *ngIf="avatarUploading" class="avatar-upload-overlay">
        <div class="spinner-sm spinner-white"></div>
      </div>
    </div>
    <div class="avatar-name">{{ form.firstName }} {{ form.lastName }}</div>
    <div class="avatar-company">{{ companyName }}</div>

    <label class="btn-change-photo" [class.disabled]="avatarUploading">
      <app-icon name="upload" [size]="14"></app-icon>
      {{ avatarUploading ? 'Завантаження...' : 'Змінити фото' }}
      <input type="file" accept="image/*" (change)="onAvatarFileSelected($event)"
             style="display:none" [disabled]="avatarUploading">
    </label>

    <div *ngIf="avatarError" class="avatar-error">{{ avatarError }}</div>
    <div class="user-id">ID: {{ userId }}</div>
  </div>

  <!-- Form card -->
  <div class="card">
    <div class="form-header">
      <span class="form-title">Особисті дані</span>
      <div *ngIf="!editing">
        <button class="btn-edit" (click)="startEdit()">
          <app-icon name="edit" [size]="14"></app-icon>
          Редагувати
        </button>
      </div>
      <div *ngIf="editing" class="edit-btns">
        <button class="btn-cancel-edit" (click)="cancelEdit()" [disabled]="saving">Скасувати</button>
        <button class="btn-save" (click)="save()" [disabled]="saving">
          <span *ngIf="!saving">Зберегти</span>
          <span *ngIf="saving" class="spinner-sm"></span>
        </button>
      </div>
    </div>

    <div *ngIf="saved" class="save-notice">
      <app-icon name="check" [size]="16" stroke="var(--green-dark)"></app-icon>
      Дані успішно збережено
    </div>

    <div *ngIf="error" class="error-notice">
      <app-icon name="info" [size]="16" stroke="#C62828"></app-icon>
      {{ error }}
    </div>

    <div class="form-grid">
      <div class="form-field">
        <label>ПРІЗВИЩЕ</label>
        <input type="text" [(ngModel)]="form.lastName"
               [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>ІМ'Я</label>
        <input type="text" [(ngModel)]="form.firstName"
               [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>ТЕЛЕФОН</label>
        <input type="tel" [(ngModel)]="form.phone"
               [disabled]="!editing" [class.active]="editing">
      </div>
      <div class="form-field">
        <label>EMAIL</label>
        <input type="email" [value]="form.email" disabled>
      </div>
      <div class="form-field full-width">
        <label>КОМПАНІЯ</label>
        <input type="text" [value]="companyName || '—'" disabled>
      </div>
    </div>

    <div class="terms-row">
      <div class="checkbox-custom"
           [class.checked]="form.acceptedTerms"
           (click)="editing && (form.acceptedTerms = !form.acceptedTerms)">
        <app-icon *ngIf="form.acceptedTerms" name="check" [size]="12" stroke="#fff" [strokeWidth]="2.5"></app-icon>
      </div>
      <span class="terms-text">
        Я погоджуюсь з <span class="link-green">умовами користування сервісом</span>
        та <span class="link-green">політикою конфіденційності</span>
      </span>
    </div>
  </div>
</div>
