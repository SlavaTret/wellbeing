<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/wellbeing-logo.png" alt="Wellbeing Company" class="admin-login-logo-img" />
    </div>

    <h1 class="login-title">Вхід в адмін-панель</h1>
    <p class="login-desc">Тільки для авторизованих адміністраторів</p>

    <div *ngIf="error" class="error-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B8879" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input [type]="'email'" [(ngModel)]="email" placeholder="admin@wellbeing.vision" [disabled]="loading" (keyup.enter)="submit()" />
      </div>
    </div>

    <div class="field">
      <label>Пароль</label>
      <div class="input-wrap">
        <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B8879" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="••••••••" [disabled]="loading" (keyup.enter)="submit()" />
        <button type="button" class="eye-btn" (click)="showPassword = !showPassword">
          <svg *ngIf="!showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B8879" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg *ngIf="showPassword" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B8879" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-login" (click)="submit()" [disabled]="loading">
      <span *ngIf="!loading">Увійти</span>
      <span *ngIf="loading" class="spinner"></span>
    </button>
  </div>
</div>
